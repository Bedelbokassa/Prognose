<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio 5 Prognose</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0f0f12; --card: #18181b; --border: #27272a; 
            --accent: #3b82f6; --text: #f4f4f5; --text-dim: #a1a1aa; --danger: #ef4444; 
        }
        
        /* Grunnleggende oppsett */
        body { 
            background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            margin: 0; min-height: 100vh; display: block; /* Endret fra flex for å unngå sentreringskrøll */
        }
        
        /* LOGIN SKJERM - Denne skal være midtstilt */
        #login-screen { 
            display: none; /* Styres av JS */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); align-items: center; justify-content: center; z-index: 1000;
        }
        .login-box { background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 320px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 12px; background: #27272a; border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }

        /* HOVEDINNHOLD */
        #main-content { display: none; padding: 20px; width: 100%; box-sizing: border-box; }
        
        .header-title { font-size: 28px; font-weight: 800; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; background: var(--card); padding: 16px; border-radius: 12px; border: 1px solid var(--border); }
        button, select { background-color: #27272a; color: white; border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; }

        .chart-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; height: 280px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; text-align: center; }
        .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; }
        .stat-value { font-size: 22px; font-weight: 800; color: white; margin-top: 5px; }

        /* Tabell-kontainer som tillater rulling */
        .scroll-container { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); background: var(--card); }
        table { border-collapse: collapse; min-width: 3200px; table-layout: fixed; }
        th, td { border: 1px solid var(--border); text-align: center; width: 65px; height: 45px; }
        
        /* Sticky kolonne for navn */
        .name-col { position: sticky; left: 0; background: #18181b; z-index: 20; width: 280px; text-align: left !important; padding: 0 15px; border-right: 2px solid var(--border); }
        .name-content { display: flex; align-items: center; gap: 10px; }
        
        .header-year { background: #09090b; font-size: 14px; font-weight: 900; height: 35px; }
        .header-month { background: #111113; font-size: 12px; font-weight: bold; height: 30px; color: #3b82f6; text-transform: uppercase; }
        .header-week { background: #18181b; font-size: 10px; color: var(--text-dim); height: 30px; }
        
        .row-summary { cursor: pointer; background: #1c1c21; font-weight: 600; }
        .row-project { background: #121215; font-size: 12px; color: var(--text-dim); }
        .row-total { background: #09090b; font-weight: 800; border-top: 2px solid var(--accent); color: white; }

        /* Input uten piler */
        input[type=number] { width: 100%; height: 100%; background: transparent; border: none; color: inherit; text-align: center; font-weight: bold; outline: none; -moz-appearance: textfield; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .remove-proj-btn { opacity: 0; color: var(--danger); background: transparent; border: none; cursor: pointer; font-size: 18px; }
        .row-project:hover .remove-proj-btn { opacity: 1; }
        .nc-tag { color: #3b82f6; font-weight: bold; }
        .uf-tag { color: var(--text-dim); font-style: italic; opacity: 0.6; }

        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 12px; width: 400px; border: 1px solid var(--border); }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 10px; background: #27272a; border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-bottom: 20px;">Studio 5</h2>
            <input type="email" id="email" placeholder="E-post">
            <input type="password" id="password" placeholder="Passord">
            <button onclick="handleLogin()">Logg inn</button>
            <p id="login-error" style="color:var(--danger); font-size:12px; margin-top:15px;"></p>
        </div>
    </div>

    <div id="main-content">
        <div class="header-title">
            <span>Studio 5 Prognose <span id="samletProsent" style="font-size: 14px; color: var(--text-dim); font-weight: normal; margin-left: 20px;"></span></span>
            <button onclick="changePassword()" style="background:#3f3f46; border:none; font-size:12px; padding:8px 15px; margin-right:10px;">Bytt passord</button>
            <button onclick="handleLogout()" style="background:var(--danger); border:none; font-size:12px; padding:8px 15px;">Logg ut</button>
        </div>

        <div class="toolbar">
            <select id="viewFilter" onchange="renderUI()"><option value="ansatte">Vis: Ansatte</option><option value="prosjekter">Vis: Prosjekter</option></select>
            <select id="groupFilter" onchange="renderUI()"><option value="Alle">Alle Team</option><option value="Sigurd">Sigurd</option><option value="Carl">Carl</option></select>
            <button onclick="openNewProjectModal()" style="background:var(--accent); border:none; font-weight:600;">+ Nytt Prosjekt</button>
            <div id="saveStatus" style="margin-left: auto; color: #4ade80; font-size: 12px;"></div>
        </div>

        <div id="chartSection" class="chart-container"><canvas id="utilizationChart"></canvas></div>

        <div id="statsSection" class="stats-grid" style="display:none;">
            <div class="stat-card"><div class="stat-label">Nordic prosjekter</div><div id="statNordicCount" class="stat-value">0</div></div>
            <div class="stat-card"><div class="stat-label">NC prosjekter</div><div id="statNC" class="stat-value">0</div></div>
            <div class="stat-card"><div class="stat-label">% NC prosjekter</div><div id="statPercNC" class="stat-value">0%</div></div>
            <div class="stat-card"><div class="stat-label">Nordic timer (% av faktur.)</div><div id="statNordicTimer" class="stat-value">0%</div></div>
        </div>

        <div class="scroll-container">
            <table><thead id="tableHead"></thead><tbody id="tableBody"></tbody><tfoot id="tableFoot"></tfoot></table>
        </div>
    </div>

    <div id="projectModal" class="modal-overlay"><div class="modal-content">
        <h3 id="modalTitle">Prosjekt</h3>
        <input type="hidden" id="editProjId"><input type="text" id="projNo" placeholder="Prosjektnummer"><input type="text" id="projName" placeholder="Navn...">
        <div style="display:flex; gap:15px; margin-bottom:15px; font-size:13px; color:var(--text-dim);">
            <label><input type="radio" name="projType" value="nordic" checked> Nordic</label>
            <label><input type="radio" name="projType" value="nc"> NC</label>
            <label><input type="radio" name="projType" value="uf"> Ufakt.</label>
        </div>
        <button onclick="saveProject()" style="width:100%; background:var(--accent); border:none; padding:12px; border-radius:6px; font-weight:600;">Lagre</button>
        <button id="deleteBtn" style="width:100%; margin-top:5px; background:var(--danger); border:none; padding:12px; border-radius:6px;" onclick="deleteProject()">Slett</button>
        <button onclick="closeModals()" style="width:100%; margin-top:5px;">Avbryt</button>
    </div></div>
    <div id="assignModal" class="modal-overlay"><div class="modal-content"><h3>Tildel prosjekt</h3><input type="text" id="projectSearch" placeholder="Søk..." oninput="filterProjects()"><div id="projectList" style="max-height:300px; overflow-y:auto;"></div><button onclick="closeModals()" style="width:100%; margin-top:10px;">Avbryt</button></div></div>

    <script>
        const supabaseUrl = 'https://gtebkasmqdvqhwesqkcq.supabase.co';
        const supabaseKey = 'sb_publishable_fh-IwZS8DpRwwU_ETq7yZg_QvezjZe5'; 
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        let data = { employees: [], projects: [], assignments: [], timeline: [] };
        let expanded = new Set();
        let chartInstance = null;
        let activeAssignee = null;

        // AUTH
        async function checkUser() {
            const { data: { session } } = await db.auth.getSession();
            if (session) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                init();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
            }
        }
        async function handleLogin() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const { error } = await db.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('login-error').innerText = "Feil e-post eller passord."; else location.reload();
        }
        async function handleLogout() { await db.auth.signOut(); location.reload(); }
        async function changePassword() {
    const ny = prompt("Skriv inn nytt passord (minst 6 tegn):");
    if (!ny || ny.length < 6) return alert("Avbrutt: Passordet må være minst 6 tegn.");
    
    const { error } = await db.auth.updateUser({ password: ny });
    if (error) alert("Feil ved bytte av passord: " + error.message);
    else alert("Passordet ditt er nå oppdatert!");
}

        // FARGER
        function getCellColor(v) {
            if (!v || v === 0) return "transparent";
            if (v > 100) return "rgba(239, 68, 68, 0.3)";
            const r = Math.round(234 - (234 - 34) * (v / 100));
            const g = Math.round(179 + (197 - 179) * (v / 100));
            const b = Math.round(8 + (94 - 8) * (v / 100));
            return `rgba(${r}, ${g}, ${b}, 0.2)`;
        }

        async function init() { buildTimeline(52); await fetchData(); renderUI(); }
        async function fetchData() { 
          const [emp, proj, ass] = await Promise.all([db.from('ansatte').select('*').order('navn'), db.from('prosjekter').select('*').order('navn'), db.from('bemanning').select('*')]);
            data.employees = emp.data || []; data.projects = proj.data || []; data.assignments = ass.data || [];
        }

        function buildTimeline(weeks) {
            const start = new Date(); start.setDate(start.getDate() - (start.getDay() || 7) - 6);
            for(let i = 0; i < weeks; i++) {
                const d = new Date(start); d.setDate(d.getDate() + (i * 7));
                const target = new Date(d.valueOf());
                const dayNr = (d.getDay() + 6) % 7; target.setDate(target.getDate() - dayNr + 3);
                const w = 1 + Math.round(((target.getTime() - new Date(target.getFullYear(), 0, 4).getTime()) / 86400000 - 3 + (new Date(target.getFullYear(), 0, 4).getDay() + 6) % 7) / 7);
                data.timeline.push({ id: `u${w}/${d.getFullYear().toString().slice(-2)}`, week: w, month: d.toLocaleString('no-NO', {month:'short'}), year: d.getFullYear() });
            }
        }

        async function save(ansatt, prosjekt, uke, prosent) {
            const id = `${ansatt}_${prosjekt}_${uke}`;
            const num = prosent === '' ? 0 : Number(prosent);
            const { error } = await db.from('bemanning').upsert({ id, ansatt, prosjekt, uke, prosent: num });
            if (!error) {
                const ex = data.assignments.find(a => a.id === id);
                if (ex) ex.prosent = num; else data.assignments.push({ id, ansatt, prosjekt, uke, prosent: num });
                document.getElementById('saveStatus').innerText = "Lagret";
                setTimeout(() => document.getElementById('saveStatus').innerText = "", 800);
                renderTotaler(); updateChart(); updateStats(); updateSummaryRow(ansatt);
            }
        }

        function updateSummaryRow(ansattName) {
            const row = Array.from(document.querySelectorAll('.row-summary')).find(r => r.textContent.includes(ansattName));
            if (!row) return;
            const cells = row.querySelectorAll('td');
            data.timeline.forEach((t, i) => {
                const sum = data.assignments.filter(a => a.ansatt === ansattName && a.uke === t.id).reduce((s, a) => s + Number(a.prosent), 0);
                const cell = cells[i + 1];
                if (cell) {
                    cell.textContent = sum > 0 ? sum + '%' : '-';
                    cell.style.backgroundColor = getCellColor(sum);
                    cell.style.color = sum > 100 ? "#f87171" : "#fff";
                }
            });
        }

        function updateStats() {
            const view = document.getElementById('viewFilter').value;
            if (view !== 'prosjekter') return;
            const fakt = data.projects.filter(p => !p.er_ufakturerbart);
            const nc = fakt.filter(p => p.er_nc);
            let totalT = 0, nordicT = 0;
            data.assignments.forEach(a => {
                const p = data.projects.find(proj => proj.navn === a.prosjekt);
                if (p && !p.er_ufakturerbart) { totalT += Number(a.prosent); if (!p.er_nc) nordicT += Number(a.prosent); }
            });
            document.getElementById('statNordicCount').innerText = fakt.length - nc.length;
            document.getElementById('statNC').innerText = nc.length;
            document.getElementById('statPercNC').innerText = fakt.length > 0 ? Math.round((nc.length / fakt.length) * 100) + '%' : '0%';
            document.getElementById('statNordicTimer').innerText = totalT > 0 ? Math.round((nordicT / totalT) * 100) + '%' : '0%';
        }

        function renderTotaler() {
            const gF = document.getElementById('groupFilter').value;
            const view = document.getElementById('viewFilter').value;
            const foot = document.getElementById('tableFoot');
            if (view !== 'ansatte') { foot.innerHTML = ''; return; }
            const fEmps = data.employees.filter(e => gF === 'Alle' || e.gruppe === gF);
            let h = `<tr class="row-total"><td class="name-col">TOTAL UTNYTTELSE (TEAM)</td>`;
            data.timeline.forEach(t => {
                let total = 0;
                fEmps.forEach(e => { total += data.assignments.filter(a => a.ansatt === e.navn && a.uke === t.id).reduce((s, a) => s + Number(a.prosent), 0); });
                const avg = Math.round(total / (fEmps.length || 1));
                h += `<td style="background-color: ${getCellColor(avg)}">${avg}%</td>`;
            });
            foot.innerHTML = h + '</tr>';
        }

        function renderUI() {
            const view = document.getElementById('viewFilter').value;
            document.getElementById('chartSection').style.display = view === 'ansatte' ? 'block' : 'none';
            document.getElementById('statsSection').style.display = view === 'prosjekter' ? 'grid' : 'none';
            const head = document.getElementById('tableHead');
            let yrs = '<th class="name-col header-year"></th>', mos = '<th class="name-col header-month">Navn / Nr</th>', wks = '<th class="name-col header-week"></th>';
            let curY = data.timeline[0].year, yC = 0, curM = data.timeline[0].month, mC = 0;
            data.timeline.forEach((t, i) => {
                wks += `<th class="header-week">U${t.week}</th>`;
                if (t.year === curY) yC++; else { yrs += `<th colspan="${yC}" class="header-year">${curY}</th>`; curY = t.year; yC = 1; }
                if (t.month === curM) mC++; else { mos += `<th colspan="${mC}" class="header-month">${curM}</th>`; curM = t.month; mC = 1; }
                if (i === data.timeline.length - 1) { yrs += `<th colspan="${yC}" class="header-year">${curY}</th>`; mos += `<th colspan="${mC}" class="header-month">${curM}</th>`; }
            });
            head.innerHTML = `<tr>${yrs}</tr><tr>${mos}</tr><tr>${wks}</tr>`;
            const gF = document.getElementById('groupFilter').value;
            const body = document.getElementById('tableBody'); body.innerHTML = '';
            if (view === 'ansatte') {
                data.employees.filter(e => gF === 'Alle' || e.gruppe === gF).forEach(emp => {
                    const tr = document.createElement('tr'); tr.className='row-summary';
                    tr.onclick = (e) => { if(!e.target.closest('button')) { expanded.has(emp.navn) ? expanded.delete(emp.navn) : expanded.add(emp.navn); renderUI(); } };
                    let h = `<td class="name-col"><div class="name-content"><span>${expanded.has(emp.navn)?'▼':'▶'}</span> ${emp.navn}</div></td>`;
                    data.timeline.forEach(t => {
                        const sum = data.assignments.filter(a => a.ansatt === emp.navn && a.uke === t.id).reduce((s, a) => s + Number(a.prosent), 0);
                        h += `<td style="background-color: ${getCellColor(sum)}; color: ${sum > 100 ? '#f87171' : '#fff'}">${sum > 0 ? sum + '%' : '-'}</td>`;
                    });
                    tr.innerHTML = h; body.appendChild(tr);
                    if (expanded.has(emp.navn)) {
                        [...new Set(data.assignments.filter(a => a.ansatt === emp.navn).map(a => a.prosjekt))].forEach(pn => {
                            const pDb = data.projects.find(p => p.navn === pn);
                            const ptr = document.createElement('tr'); ptr.className='row-project';
                            let ph = `<td class="name-col" style="padding-left:30px;"><div style="display:flex; justify-content:space-between; align-items:center;"><div class="${pDb?.er_nc?'nc-tag':(pDb?.er_ufakturerbart?'uf-tag':'')}">${pDb?.prosjektnummer ? pDb.prosjektnummer + ' - ' : ''}${pn}</div><button class="remove-proj-btn" onclick="removeProjectFromEmployee('${emp.navn}', '${pn}')">×</button></div></td>`;
                            data.timeline.forEach(t => {
                                const v = data.assignments.find(a => a.ansatt === emp.navn && a.prosjekt === pn && a.uke === t.id)?.prosent || '';
                                ph += `<td style="background-color: ${getCellColor(v)}"><input type="number" value="${v}" onchange="save('${emp.navn}', '${pn}', '${t.id}', this.value)"></td>`;
                            });
                            ptr.innerHTML = ph; body.appendChild(ptr);
                        });
                        body.insertAdjacentHTML('beforeend', `<tr><td class="name-col" style="background:#111;"><button onclick="openAssignModal('${emp.navn}')" style="font-size:10px; margin-left:20px">+ Tildel</button></td><td colspan="${data.timeline.length}"></td></tr>`);
                    }
                });
            } else {
                data.projects.forEach(p => {
                    const tr = document.createElement('tr'); tr.className='row-summary';
                    tr.onclick = (e) => { if(!e.target.closest('button')) { expanded.has(p.navn) ? expanded.delete(p.navn) : expanded.add(p.navn); renderUI(); } };
                    let h = `<td class="name-col"><div class="name-content"><span>${expanded.has(p.navn)?'▼':'▶'}</span> <span class="${p.er_nc?'nc-tag':(p.er_ufakturerbart?'uf-tag':'')}">${p.prosjektnummer ? p.prosjektnummer + ' ' : ''}${p.navn}</span><button class="edit-btn" onclick="openEditProjectModal('${p.id}', '${p.prosjektnummer || ''}', '${p.navn}', ${p.er_nc}, ${p.er_ufakturerbart})">✎</button></div></td>`;
                    data.timeline.forEach(t => { const s = data.assignments.filter(a => a.prosjekt === p.navn && a.uke === t.id).reduce((sum, a) => sum + Number(a.prosent), 0); h += `<td style="background-color: ${getCellColor(s)}">${s > 0 ? s + '%' : '-'}</td>`; });
                    tr.innerHTML = h; body.appendChild(tr);
                    if (expanded.has(p.navn)) {
                        [...new Set(data.assignments.filter(a => a.prosjekt === p.navn).map(a => a.ansatt))].forEach(an => {
                            const ptr = document.createElement('tr'); ptr.className='row-project';
                            let ph = `<td class="name-col" style="padding-left:30px;">${an}</td>`;
                            data.timeline.forEach(t => {
                                const v = data.assignments.find(a => a.ansatt === an && a.prosjekt === p.navn && a.uke === t.id)?.prosent || '';
                                ph += `<td style="background-color: ${getCellColor(v)}"><input type="number" value="${v}" onchange="save('${an}', '${p.navn}', '${t.id}', this.value)"></td>`;
                            });
                            ptr.innerHTML = ph; body.appendChild(ptr);
                        });
                    }
                });
                updateStats();
            }
            renderTotaler(); updateChart();
        }

        // MODALER
        function openNewProjectModal() { document.getElementById('modalTitle').innerText = "Nytt Prosjekt"; document.getElementById('editProjId').value = ""; document.getElementById('projNo').value = ""; document.getElementById('projName').value = ""; document.querySelector('input[name="projType"][value="nordic"]').checked = true; document.getElementById('deleteBtn').style.display = "none"; document.getElementById('projectModal').style.display = "flex"; }
        function openEditProjectModal(id, nr, navn, isNC, isUF) { document.getElementById('modalTitle').innerText = "Rediger Prosjekt"; document.getElementById('editProjId').value = id; document.getElementById('projNo').value = nr; document.getElementById('projName').value = navn; if (isNC) document.querySelector('input[name="projType"][value="nc"]').checked = true; else if (isUF) document.querySelector('input[name="projType"][value="uf"]').checked = true; else document.querySelector('input[name="projType"][value="nordic"]').checked = true; document.getElementById('deleteBtn').style.display = "block"; document.getElementById('projectModal').style.display = "flex"; }
        async function saveProject() { const id = document.getElementById('editProjId').value; const nr = document.getElementById('projNo').value; const navn = document.getElementById('projName').value; const type = document.querySelector('input[name="projType"]:checked').value; const isNC = type === 'nc', isUF = type === 'uf'; if(!navn) return; if(id) await db.from('prosjekter').update({ prosjektnummer: nr, navn: navn, er_nc: isNC, er_ufakturerbart: isUF }).eq('id', id); else await db.from('prosjekter').insert([{ prosjektnummer: nr, navn: navn, er_nc: isNC, er_ufakturerbart: isUF }]); await fetchData(); renderUI(); closeModals(); }
        async function removeProjectFromEmployee(ansatt, prosjekt) { if (confirm(`Fjerne "${prosjekt}" fra ${ansatt}?`)) { await db.from('bemanning').delete().eq('ansatt', ansatt).eq('prosjekt', prosjekt); await fetchData(); renderUI(); } }
        async function deleteProject() { const id = document.getElementById('editProjId').value; if(confirm(`Slette hele prosjektet?`)) { await db.from('prosjekter').delete().eq('id', id); await fetchData(); renderUI(); closeModals(); } }
        function openAssignModal(ansatt) { activeAssignee = ansatt; document.getElementById('assignModal').style.display = 'flex'; filterProjects(); }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); }
        function filterProjects() { const s = document.getElementById('projectSearch').value.toLowerCase(); const l = document.getElementById('projectList'); l.innerHTML = ''; data.projects.filter(p => p.navn.toLowerCase().includes(s)).forEach(p => { const d = document.createElement('div'); d.style.padding="10px"; d.style.cursor="pointer"; d.innerText = p.navn; d.onclick = async () => { await save(activeAssignee, p.navn, data.timeline[0].id, 0); closeModals(); await fetchData(); renderUI(); }; l.appendChild(d); }); }

        function updateChart() {
            const filter = document.getElementById('groupFilter').value; const fEmps = data.employees.filter(e => filter === 'Alle' || e.gruppe === filter); const nEmps = fEmps.length || 1;
            const tData = data.timeline.map(t => { let s = 0; fEmps.forEach(e => { s += data.assignments.filter(a => a.ansatt === e.navn && a.uke === t.id).reduce((sum, a) => sum + Number(a.prosent), 0); }); return Math.round(s / nEmps); });
            const fData = data.timeline.map(t => { let s = 0; fEmps.forEach(e => { s += data.assignments.filter(a => { const p = data.projects.find(proj => proj.navn === a.prosjekt); return a.ansatt === e.navn && a.uke === t.id && p && !p.er_ufakturerbart; }).reduce((sum, a) => sum + Number(a.prosent), 0); }); return Math.round(s / nEmps); });
            const ctx = document.getElementById('utilizationChart').getContext('2d'); if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, { type: 'line', data: { labels: data.timeline.map(t => 'U'+t.week), datasets: [{ label: 'Total', data: tData, borderColor: '#3b82f6', fill: true, tension: 0.4 }, { label: 'Fakturerbar', data: fData, borderColor: '#ffffff', borderDash: [5, 5], tension: 0.4 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 120 } } } });
        }

        checkUser();
    </script>
</body>
</html>
