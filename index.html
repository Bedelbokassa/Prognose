<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio 5 Prognose</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f0f12; --card: #18181b; --border: #27272a; --accent: #3b82f6; --text: #f4f4f5; --text-dim: #a1a1aa; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .header-title { font-size: 28px; font-weight: 800; margin-bottom: 20px; color: white; display: flex; align-items: center; justify-content: space-between; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; background: var(--card); padding: 16px; border-radius: 12px; border: 1px solid var(--border); }
        button, select { background-color: #27272a; color: white; border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        button:hover { background-color: #3f3f46; }
        .btn-add { background-color: var(--accent); border: none; font-weight: 600; }
        .chart-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; height: 250px; }
        .scroll-container { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); background: var(--card); }
        table { border-collapse: collapse; min-width: 3000px; table-layout: fixed; }
        th, td { border: 1px solid var(--border); padding: 0; text-align: center; width: 65px; height: 45px; }
        .name-col { position: sticky; left: 0; background-color: #18181b; z-index: 20; width: 280px; min-width: 280px; text-align: left; padding: 0 15px; border-right: 2px solid var(--border); }
        .header-year { background: #09090b; font-size: 11px; color: var(--text-dim); height: 25px; }
        .header-month { background: #111113; font-size: 11px; font-weight: bold; height: 25px; }
        .header-week { background: #18181b; font-size: 10px; color: var(--text-dim); height: 30px; }
        .row-summary { cursor: pointer; background: #1c1c21; font-weight: 600; }
        .row-project { background: #121215; font-size: 12px; color: var(--text-dim); }
        input[type=number] { width: 100%; height: 100%; background: transparent; border: none; color: white; text-align: center; font-size: 13px; font-weight: bold; outline: none; -moz-appearance: textfield; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .val-low { color: #60a5fa; }
        .val-ok { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
        .val-over { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        .nc-tag { color: #3b82f6; font-weight: bold; }
        .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 12px; width: 400px; border: 1px solid var(--border); }
        .modal-content input[type=text], .modal-content select { width: 100%; padding: 12px; background: #27272a; border: 1px solid var(--border); color: white; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; }
        .project-list { max-height: 300px; overflow-y: auto; }
        .project-item { padding: 10px; cursor: pointer; border-radius: 4px; border-bottom: 1px solid #27272a; }
        .project-item:hover { background: #27272a; color: var(--accent); }
    </style>
</head>
<body>

    <div class="header-title">Studio 5 Prognose <span id="samletProsent" style="font-size: 16px; color: var(--text-dim); font-weight: normal;"></span></div>

    <div class="toolbar">
        <select id="viewFilter" onchange="renderUI()"><option value="ansatte">Vis: Ansatte</option><option value="prosjekter">Vis: Prosjekter</option></select>
        <select id="groupFilter" onchange="renderUI()"><option value="Alle">Alle Team</option><option value="Sigurd">Sigurd</option><option value="Carl">Carl</option></select>
        <button class="btn-add" onclick="addNewProject()">+ Nytt Prosjekt</button>
        <button onclick="addNewEmployee()">+ Ny Ansatt</button>
        <div id="saveStatus" style="margin-left: auto; font-size: 12px; color: #4ade80;"></div>
    </div>

    <div class="chart-container"><canvas id="utilizationChart"></canvas></div>

    <div class="scroll-container">
        <table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
    </div>

    <div id="assignModal" class="modal-overlay"><div class="modal-content"><h3>Velg prosjekt</h3><input type="text" id="projectSearch" placeholder="Søk..." oninput="filterProjects()"><div id="projectList" class="project-list"></div><button onclick="closeModals()" style="width:100%">Avbryt</button></div></div>
    <div id="newProjectModal" class="modal-overlay"><div class="modal-content"><h3>Nytt Prosjekt</h3><input type="text" id="newProjNo" placeholder="Prosjektnummer"><input type="text" id="newProjName" placeholder="Navn..."><label style="display:flex; gap:10px; margin-bottom:15px; color:#a1a1aa;"><input type="checkbox" id="newProjNC"> NC prosjekt?</label><button class="btn-add" style="width:100%" onclick="saveNewProject()">Lagre</button><button onclick="closeModals()" style="width:100%; margin-top:5px;">Avbryt</button></div></div>
    <div id="newEmployeeModal" class="modal-overlay"><div class="modal-content"><h3>Ny Ansatt</h3><input type="text" id="newEmpName" placeholder="Navn..."><select id="newEmpGroup"><option value="Sigurd">Team Sigurd</option><option value="Carl">Team Carl</option></select><button class="btn-add" style="width:100%" onclick="saveNewEmployee()">Lagre</button><button onclick="closeModals()" style="width:100%; margin-top:5px;">Avbryt</button></div></div>

    <script>
        const supabaseUrl = 'https://gtebkasmqdvqhwesqkcq.supabase.co';
        const supabaseKey = 'sb_publishable_fh-IwZS8DpRwwU_ETq7yZg_QvezjZe5'; 
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        let data = { employees: [], projects: [], assignments: [], timeline: [] };
        let expanded = new Set();
        let chartInstance = null;
        let activeAssignee = null;

        async function init() {
            buildTimeline(52);
            await fetchData();
            renderUI();
            
            // REALTIME: Lytter på endringer i databasen
            db.channel('db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'bemanning' }, async () => {
                await fetchData();
                renderUI();
            }).subscribe();
        }

        async function fetchData() {
            const [emp, proj, ass] = await Promise.all([db.from('ansatte').select('*'), db.from('prosjekter').select('*').order('navn'), db.from('bemanning').select('*')]);
            data.employees = emp.data || []; data.projects = proj.data || []; data.assignments = ass.data || [];
        }

        function buildTimeline(weeks) {
            const start = new Date(); start.setDate(start.getDate() - (start.getDay() || 7) - 6);
            for(let i = 0; i < weeks; i++) {
                const d = new Date(start); d.setDate(d.getDate() + (i * 7));
                const target = new Date(d.valueOf());
                const dayNr = (d.getDay() + 6) % 7; target.setDate(target.getDate() - dayNr + 3);
                const week = 1 + Math.round(((target.getTime() - new Date(target.getFullYear(), 0, 4).getTime()) / 86400000 - 3 + (new Date(target.getFullYear(), 0, 4).getDay() + 6) % 7) / 7);
                data.timeline.push({ id: `u${week}/${d.getFullYear().toString().slice(-2)}`, week: week, month: d.toLocaleString('no-NO', { month: 'short' }), year: d.getFullYear() });
            }
        }

        function renderUI() {
            renderHead();
            const view = document.getElementById('viewFilter').value;
            if (view === 'ansatte') renderAnsatte(); else renderProsjekter();
            updateChart();
        }

        function renderHead() {
            const head = document.getElementById('tableHead');
            let yrs='', mos='', wks='<th class="name-col">Navn / Nr</th>';
            let cY=0, yS=0, cM='', mS=0;
            data.timeline.forEach((t, i) => {
                wks += `<th class="header-week">U${t.week}</th>`;
                if (t.year !== cY) { if (cY !== 0) yrs += `<th colspan="${yS}" class="header-year">${cY}</th>`; cY = t.year; yS = 1; } else yS++;
                if (t.month !== cM) { if (cM !== '') mos += `<th colspan="${mS}" class="header-month">${cM}</th>`; cM = t.month; mS = 1; } else mS++;
                if (i === data.timeline.length-1) { yrs += `<th colspan="${yS}" class="header-year">${cY}</th>`; mos += `<th colspan="${mS}" class="header-month">${cM}</th>`; }
            });
            head.innerHTML = `<tr><th class="name-col header-year">År</th>${yrs}</tr><tr><th class="name-col header-month">Måned</th>${mos}</tr><tr>${wks}</tr>`;
        }

        function renderAnsatte() {
            const body = document.getElementById('tableBody');
            const filter = document.getElementById('groupFilter').value;
            body.innerHTML = '';
            data.employees.filter(e => filter === 'Alle' || e.gruppe === filter).forEach(emp => {
                const tr = document.createElement('tr'); tr.className='row-summary';
                tr.onclick = () => { expanded.has(emp.navn) ? expanded.delete(emp.navn) : expanded.add(emp.navn); renderAnsatte(); };
                let h = `<td class="name-col"><span>${expanded.has(emp.navn)?'▼':'▶'}</span> ${emp.navn}</td>`;
                data.timeline.forEach(t => {
                    const sum = data.assignments.filter(a => a.ansatt === emp.navn && a.uke === t.id).reduce((s, a) => s + Number(a.prosent), 0);
                    h += `<td class="${sum>100?'val-over':(sum===100?'val-ok':(sum>0?'val-low':''))}">${sum>0?sum+'%':'-'}</td>`;
                });
                tr.innerHTML = h; body.appendChild(tr);
                if (expanded.has(emp.navn)) {
                    const empProjs = [...new Set(data.assignments.filter(a => a.ansatt === emp.navn).map(a => a.prosjekt))];
                    empProjs.forEach(pn => {
                        const pDb = data.projects.find(p => p.navn === pn);
                        const ptr = document.createElement('tr'); ptr.className='row-project';
                        let ph = `<td class="name-col ${pDb?.er_nc?'nc-tag':''}" style="padding-left:30px; font-size:11px;">${pDb?.prosjektnummer ? pDb.prosjektnummer + ' - ' : ''}${pn}</td>`;
                        data.timeline.forEach(t => {
                            const v = data.assignments.find(a => a.ansatt === emp.navn && a.prosjekt === pn && a.uke === t.id)?.prosent || '';
                            ph += `<td><input type="number" value="${v}" onchange="save('${emp.navn}', '${pn}', '${t.id}', this.value)"></td>`;
                        });
                        ptr.innerHTML = ph; body.appendChild(ptr);
                    });
                    const addTr = document.createElement('tr');
                    addTr.innerHTML = `<td class="name-col" style="background:#111; padding:5px 15px;"><button onclick="openAssignModal('${emp.navn}')" style="font-size:10px">+ Tildel prosjekt</button></td><td colspan="${data.timeline.length}"></td>`;
                    body.appendChild(addTr);
                }
            });
        }

        function renderProsjekter() {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            data.projects.forEach(p => {
                const tr = document.createElement('tr'); tr.className='row-summary';
                tr.onclick = () => { expanded.has(p.navn) ? expanded.delete(p.navn) : expanded.add(p.navn); renderProsjekter(); };
                let h = `<td class="name-col ${p.er_nc?'nc-tag':''}"><span>${expanded.has(p.navn)?'▼':'▶'}</span> ${p.prosjektnummer ? p.prosjektnummer + ' ' : ''}${p.navn}</td>`;
                data.timeline.forEach(t => {
                    const sum = data.assignments.filter(a => a.prosjekt === p.navn && a.uke === t.id).reduce((s, a) => s + Number(a.prosent), 0);
                    h += `<td>${sum>0?sum+'%':'-'}</td>`;
                });
                tr.innerHTML = h; body.appendChild(tr);
                if (expanded.has(p.navn)) {
                    const pAnsatte = [...new Set(data.assignments.filter(a => a.prosjekt === p.navn).map(a => a.ansatt))];
                    pAnsatte.forEach(an => {
                        const ptr = document.createElement('tr'); ptr.className='row-project';
                        let ph = `<td class="name-col" style="padding-left:30px;">${an}</td>`;
                        data.timeline.forEach(t => {
                            const v = data.assignments.find(a => a.ansatt === an && a.prosjekt === p.navn && a.uke === t.id)?.prosent || '';
                            ph += `<td><input type="number" value="${v}" onchange="save('${an}', '${p.navn}', '${t.id}', this.value)"></td>`;
                        });
                        ptr.innerHTML = ph; body.appendChild(ptr);
                    });
                }
            });
        }

        async function save(ansatt, prosjekt, uke, prosent) {
            const id = `${ansatt}_${prosjekt}_${uke}`;
            await db.from('bemanning').upsert({ id, ansatt, prosjekt, uke, prosent: prosent || 0 });
            document.getElementById('saveStatus').innerText = "Lagret";
            setTimeout(() => document.getElementById('saveStatus').innerText = "", 1000);
        }

        function openAssignModal(ansatt) { activeAssignee = ansatt; document.getElementById('assignModal').style.display = 'flex'; filterProjects(); }
        function addNewProject() { document.getElementById('newProjectModal').style.display = 'flex'; }
        function addNewEmployee() { document.getElementById('newEmployeeModal').style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display='none'); }

        async function saveNewProject() {
            const n = document.getElementById('newProjName').value;
            const nr = document.getElementById('newProjNo').value;
            const nc = document.getElementById('newProjNC').checked;
            if(n) { await db.from('prosjekter').insert([{ navn: n, er_nc: nc, prosjektnummer: nr }]); await fetchData(); renderUI(); closeModals(); }
        }

        async function saveNewEmployee() {
            const n = document.getElementById('newEmpName').value;
            const g = document.getElementById('newEmpGroup').value;
            if(n) { await db.from('ansatte').insert([{ navn: n, gruppe: g }]); await fetchData(); renderUI(); closeModals(); }
        }

        function filterProjects() {
            const s = document.getElementById('projectSearch').value.toLowerCase();
            const l = document.getElementById('projectList'); l.innerHTML = '';
            data.projects.filter(p => p.navn.toLowerCase().includes(s)).forEach(p => {
                const d = document.createElement('div'); d.className='project-item'; d.innerText = p.navn;
                d.onclick = async () => { await save(activeAssignee, p.navn, data.timeline[0].id, 0); closeModals(); };
                l.appendChild(d);
            });
        }

        function updateChart() {
            const filter = document.getElementById('groupFilter').value;
            const filteredEmps = data.employees.filter(e => filter === 'Alle' || e.gruppe === filter);
            const numEmps = filteredEmps.length || 1;
            const snittData = data.timeline.map(t => {
                let sum = 0;
                filteredEmps.forEach(e => { sum += data.assignments.filter(a => a.ansatt === e.navn && a.uke === t.id).reduce((s, a) => s + Number(a.prosent), 0); });
                return Math.round(sum / numEmps);
            });
            document.getElementById('samletProsent').innerText = `Snitt: ${Math.round(snittData.reduce((a,b)=>a+b,0)/snittData.length)}%`;
            const ctx = document.getElementById('utilizationChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line', data: { labels: data.timeline.map(t => 'U'+t.week), datasets: [{ data: snittData, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 120 }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        init();
    </script>
</body>
</html>
